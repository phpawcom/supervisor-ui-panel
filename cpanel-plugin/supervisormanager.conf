# cPanel AppConfig Plugin Registration File
# Location: /usr/local/cpanel/3rdparty/etc/cpanelplugins/supervisormanager.conf
#
# This file registers the Supervisor Manager as a cPanel plugin
# visible in the Jupiter (Paper Lantern) theme.
#
# Reference: https://api.docs.cpanel.net/guides/guide-to-cpanel-plugins/
#
# Install via: /usr/local/cpanel/bin/register_appconfig /path/to/this/file

[supervisormanager]
name=Supervisor Manager
version=1.0.0
desc=Manage Laravel Queue, Scheduler, and Reverb WebSocket workers for your applications
icon=/3rdparty/laravel_supervisor_plugin/public/icon.svg
group=Software
order=400
url=/3rdparty/laravel_supervisor_plugin/public/index.html
service=cpanel|whostmgr
