# WHM Plugin Registration
# Location: /usr/local/cpanel/whostmgr/conf/whm_plugins.conf
#
# Entry to append to /usr/local/cpanel/whostmgr/conf/whm_plugins.conf:
#
#   WHMModule=supervisormanager
#
# The plugin index file must be at:
#   /usr/local/cpanel/whostmgr/docroot/cgi/supervisormanager/index.cgi
#
# Reference:
#   https://api.docs.cpanel.net/guides/guide-to-whm-plugins/

module=supervisormanager
name=Supervisor Manager
icon=plugin-icons/supervisormanager.svg
group=cPanel
order=400
url=../cgi/supervisormanager/index.cgi
acl=all
acl_user_access=1
